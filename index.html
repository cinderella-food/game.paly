<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ستوريات فقط</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --primary-color: #e91e63;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500 bounds;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-secondary {
            background-color: #333;
        }
        .auth-box, .upload-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .auth-box input, .upload-box textarea, .upload-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            box-sizing: border-box;
        }
        .stories-container {
            margin-top: 20px;
        }
        .story-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary-color);
            position: relative;
        }
        .story-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .story-content {
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .story-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
        }
        .story-footer {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .time-left {
            color: #ff9800;
            font-size: 12px;
        }
        .reactions {
            display: flex;
            gap: 10px;
        }
        .react-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">ستوريات 24</div>
        <div id="auth-buttons">
            <button class="btn" id="show-auth-btn" onclick="toggleAuthBox()">تسجيل دخول / إنشاء حساب</button>
            <button class="btn btn-secondary" id="logout-btn" style="display:none;" onclick="logout()">خروج</button>
        </div>
    </header>

    <div id="auth-box" class="auth-box">
        <h3 id="auth-title">تسجيل الدخول</h3>
        <input type="email" id="auth-email" placeholder="البريد الإلكتروني">
        <input type="password" id="auth-password" placeholder="كلمة المرور">
        <button class="btn" id="main-auth-btn" onclick="handleAuth()">دخول</button>
        <button class="btn btn-secondary" onclick="switchAuthMode()" id="switch-btn">ليس لديك حساب؟ إنشاء حساب</button>
    </div>

    <div id="upload-box" class="upload-box">
        <h3>انشر ستوري جديدة (تختفي بعد 24 ساعة)</h3>
        <textarea id="story-text" rows="3" placeholder="ماذا يدور في ذهنك؟"></textarea>
        <label for="story-file">إضافة صورة (اختياري):</label>
        <input type="file" id="story-file" accept="image/*">
        <button class="btn" onclick="uploadStory()">نشر الآن</button>
    </div>

    <div class="stories-container">
        <h3>الستوريات العامة الحالية</h3>
        <div id="stories-list"></div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDxVjhjN7Pr9M-fSSOepieJh8fahQDDkrc",
        authDomain: "real-money-game-ad3b8.firebaseapp.com",
        databaseURL: "https://real-money-game-ad3b8-default-rtdb.firebaseio.com",
        projectId: "real-money-game-ad3b8",
        storageBucket: "real-money-game-ad3b8.firebasestorage.app",
        messagingSenderId: "280751444756",
        appId: "1:280751444756:android:603b3f1fcebe6742b46801"
    };

    // تهيئة الفايربيس
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    const storage = firebase.storage();

    let isSignUpMode = false;
    let currentUser = null;

    // مراقبة حالة المستخدم
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('show-auth-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('upload-box').style.display = 'block';
            document.getElementById('auth-box').style.display = 'none';
        } else {
            currentUser = null;
            document.getElementById('show-auth-btn').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('upload-box').style.display = 'none';
        }
    });

    function toggleAuthBox() {
        const box = document.getElementById('auth-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function switchAuthMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-title').innerText = isSignUpMode ? "إنشاء حساب جديد" : "تسجيل الدخول";
        document.getElementById('main-auth-btn').innerText = isSignUpMode ? "تسجيل حساب" : "دخول";
        document.getElementById('switch-btn').innerText = isSignUpMode ? "لديك حساب بالفعل؟ دخول" : "ليس لديك حساب؟ إنشاء حساب";
    }

    // تسجيل أو دخول
    function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;

        if(!email || !password) return alert('الرجاء ملء الحقول');

        if (isSignUpMode) {
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert('تم إنشاء الحساب بنجاح!'))
                .catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(email, password)
                .then(() => alert('تم تسجيل الدخول!'))
                .catch(err => alert(err.message));
        }
    }

    function logout() {
        auth.signOut();
    }

    // رفع الستوري
    async function uploadStory() {
        const text = document.getElementById('story-text').value;
        const fileInput = document.getElementById('story-file');
        const file = fileInput.files[0];

        if (!text && !file) return alert('اكتب شيء أو اختر صورة لنشر الستوري!');

        const timestamp = Date.now();
        const expiryTime = timestamp + (24 * 60 * 60 * 1000); // بعد 24 ساعة بالضبط
        let imageUrl = "";

        if (file) {
            const fileRef = storage.ref(`stories/${timestamp}_${file.name}`);
            const snapshot = await fileRef.put(file);
            imageUrl = await snapshot.ref.getDownloadURL();
        }

        const storyData = {
            userId: currentUser.uid,
            userEmail: currentUser.email.split('@')[0],
            text: text,
            imageUrl: imageUrl,
            timestamp: timestamp,
            expiryTime: expiryTime,
            likes: 0
        };

        database.ref('stories').push(storyData).then(() => {
            document.getElementById('story-text').value = '';
            fileInput.value = '';
            alert('تم نشر الستوري بنجاح وعام للجميع!');
        });
    }

    // جلب وعرض الستوريات العامة
    database.ref('stories').on('value', snapshot => {
        const storiesList = document.getElementById('stories-list');
        storiesList.innerHTML = '';
        const now = Date.now();

        snapshot.forEach(childSnapshot => {
            const storyId = childSnapshot.key;
            const story = childSnapshot.val();

            // التحقق من ميزة الـ 24 ساعة
            if (now > story.expiryTime) {
                // إذا انتهت الـ 24 ساعة، يتم إهمالها ولا تظهر (ويمكن حذفها من الداتابيز تلقائياً هنا)
                database.ref(`stories/${storyId}`).remove();
                return;
            }

            const timeLeftMs = story.expiryTime - now;
            const hoursLeft = Math.floor(timeLeftMs / (1000 * 60 * 60));
            const minutesLeft = Math.floor((timeLeftMs % (1000 * 60 * 60)) / (1000 * 60));

            let imgHtml = story.imageUrl ? `<img src="${story.imageUrl}" class="story-img">` : '';

            const card = document.createElement('div');
            card.className = 'story-card';
            card.innerHTML = `
                <div class="story-header">
                    <span>👤 ${story.userEmail}</span>
                    <span class="time-left">⏱ ينتهي بعد: ${hoursLeft}س و ${minutesLeft}د</span>
                </div>
                <div class="story-content">${story.text}</div>
                ${imgHtml}
                <div class="story-footer">
                    <div class="reactions">
                        <button class="react-btn" onclick="likeStory('${storyId}', ${story.likes || 0})">❤️ ${story.likes || 0}</button>
                    </div>
                </div>
            `;
            storiesList.prepend(card); // لتظهر الستوريات الأحدث أولاً
        });
    });

    // ميزة التفاعل (لايك) للعامة
    function likeStory(id, currentLikes) {
        database.ref(`stories/${id}`).update({
            likes: currentLikes + 1
        });
    }
</script>
</body>
</html>
